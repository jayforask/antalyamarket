services:
  - type: web
    name: antalyamarket-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DATABASE_URL
        fromDatabase:
          name: antalyamarket-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CORS_ORIGINS
        value: '["https://antalyamarket-admin.vercel.app","https://antalyamarket-mobile.vercel.app"]'

databases:
  - name: antalyamarket-db
    databaseName: antalyamarket
    user: antalyamarket
